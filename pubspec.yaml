name: guffgaff_ai
description: "GuffGaff AI — a hybrid Gemini-powered chat assistant."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # HTTP + streaming
  http: ^1.2.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  shared_preferences: ^2.3.2

  # Markdown rendering for AI responses
  flutter_markdown: ^0.7.3

  # Offline-first: local SQLite storage
  sqflite: ^2.3.3+1
  path: ^1.9.1

  # Connectivity detection
  connectivity_plus: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/assets/
    - assets/
